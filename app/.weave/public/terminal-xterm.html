<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>weave terminal</title>
        <!-- Theme bootstrap: mirror the dashboard so the framed terminal isn't
             a white flash on a dark page. Same-origin as the dashboard, so the
             `storage` event (terminal-xterm.js) keeps it in sync on toggle. -->
        <script>
            (function () {
                try {
                    var saved = localStorage.getItem("weave-theme");
                    if (saved === "dark" || saved === "light") {
                        document.documentElement.dataset.theme = saved;
                        return;
                    }
                } catch (e) {}
                if (
                    window.matchMedia &&
                    window.matchMedia("(prefers-color-scheme: dark)").matches
                ) {
                    document.documentElement.dataset.theme = "dark";
                }
            })();
        </script>
        <link rel="stylesheet" href="/vendor/xterm.css" />
        <style>
            html,
            body {
                margin: 0;
                height: 100%;
                background: #ffffff;
            }
            html[data-theme="dark"],
            html[data-theme="dark"] body {
                background: #0d1117;
            }
            #term {
                position: absolute;
                inset: 0;
                padding: 4px 6px;
                box-sizing: border-box;
            }
            .xterm {
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div id="term"></div>
        <!-- UMD globals must load before the client: xterm.js → `Terminal`,
             addon-fit.js → `FitAddon.FitAddon`. Classic scripts, in order. -->
        <script src="/vendor/xterm.js"></script>
        <script src="/vendor/addon-fit.js"></script>
        <script src="/terminal-xterm.js"></script>
    </body>
</html>
